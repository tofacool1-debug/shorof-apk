name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          
      - run: flutter pub get
      
      - name: Install Gradle 8.4
        run: |
          wget https://services.gradle.org/distributions/gradle-8.4-all.zip
          sudo unzip -d /opt gradle-8.4-all.zip
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH
          
      - name: Build APK Release
        run: cd android && gradle assembleRelease --no-daemon
        
      - uses: actions/upload-artifact@v4
        with:
          name: al-qomus-premium.apk
          path: build/app/outputs/flutter-apk/app-release.apk
