<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasrif Lengkap AI Gemini</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
    * {box-sizing: border-box;}
  body {
    font-family: 'Amiri', serif; 
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
    color: #fff; 
    padding: 20px; 
    text-align: center;
    min-height: 100vh;
    margin: 0;
  }
  h2 {color: #ffd700; margin-bottom: 30px;}
  label {
    display: block; 
    margin-top: 20px; 
    font-size: 18px;
    font-weight: bold;
    color: #00c6ff;
  }
  input, select, button {
    padding: 14px; 
    margin: 8px; 
    border-radius: 10px; 
    border: 2px solid rgba(255,255,255,0.2); 
    font-size: 20px; 
    font-family: 'Amiri';
    background: rgba(255,255,255,0.1);
    color: #fff;
    outline: none;
  }
  input {
    width: 250px; 
    text-align: center; 
    font-size: 26px;
    letter-spacing: 3px;
  }
  input::placeholder {color: rgba(255,255,255,0.5);}
  select {width: 280px; cursor: pointer;}
  button {
    background: #ffd700; 
    color: #000; 
    font-weight: bold; 
    cursor: pointer;
    border: none;
    transition: 0.3s;
  }
  button:hover {background: #ffed4e; transform: scale(1.05);}
  button:disabled {background: #555; cursor: not-allowed; transform: none;}
  table {
    width: 100%; 
    max-width: 900px;
    margin: 25px auto; 
    border-collapse: collapse; 
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    overflow: hidden;
  }
  th {
    background: #ffd700; 
    color: #000; 
    padding: 12px;
    font-size: 18px;
  }
  td {
    padding: 12px; 
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .arab {font-size: 28px; line-height: 2;}
  .opsi-btn {background: #00c6ff; color: #fff; margin: 5px 10px;}
  .opsi-btn:hover {background: #4ddbff;}
  .hidden {display: none;}
  h3, h4 {color: #ffd700; margin-top: 30px;}
  #hasil {margin-top: 30px;}
  @media(max-width: 600px) {
    input, select {width: 90%;}
    .arab {font-size: 22px;}
  }
</style>
</head>
<body>
  <h2>📖 Tasrif Lengkap Fi'il Tsulatsi Mujarrod - AI Gemini</h2>

  <label>1. Ketik Lafadz Dulu 👇</label>
  <input id="akar" placeholder="Ex: كتب , ضرب , علم" autocomplete="off">

  <label>2. Baru Pilih Bab 👇</label>
  <select id="bab">
    <option value="">-- Pilih Bab 1-6 --</option>
  </select>
  
  <br>
  <button id="btnTampil">3. Tampilkan Hasil</button>

  <div id="opsi" class="hidden">
    <h3>4. Pilih Jenis Fi'il:</h3>
    <button class="opsi-btn" id="btnMujarrod">Mujarrod</button>
    <button class="opsi-btn" id="btnMazid">Mazid</button>
  </div>

  <div id="hasil" class="hasil"></div>

<script src="script.js"></script>
</body>
</html>
